<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮你选车 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .token-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

        .token-number {
            font-size: 48px;
            font-weight: 700;
        }

        .token-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }

        .start-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: translateY(-2px);
        }

        .features {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }

        .feature-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            color: #666;
            font-size: 14px;
        }

        .feature-icon {
            margin-right: 12px;
            font-size: 20px;
        }

        .price-tag {
            display: inline-block;
            background: #fff3cd;
            color: #856404;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 帮你选车</h1>
        <p class="subtitle">选择困难症福音 · 智能匹配最适合你的车</p>

        <div class="token-box">
            <div class="token-number" id="token-count">3</div>
            <div class="token-label">可用 Token（首次赠送 3 次）</div>
        </div>

        <button class="start-btn" onclick="location.href='test.html'">
            开始选车
        </button>

        <div class="features">
            <div class="feature-item">
                <span class="feature-icon">✅</span>
                <span>10 道精准测试题</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">🎯</span>
                <span>AI 算法匹配</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">📊</span>
                <span>50+ 热门车型对比</span>
            </div>
            <div class="feature-item">
                <span class="feature-icon">💰</span>
                <span>0.5 元解锁完整报告</span>
            </div>
        </div>

        <div style="text-align: center;">
            <span class="price-tag">💡 首单仅需 0.5 元</span>
        </div>
    </div>

    <script>
        // 从本地存储读取 Token
        let tokens = parseInt(localStorage.getItem('car_tokens')) || 3;
        document.getElementById('token-count').textContent = tokens;
    </script>
</body>
</html>
