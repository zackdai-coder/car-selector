<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帮你选车 - 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .progress {
            background: #f0f0f0;
            height: 6px;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 15px 20px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 15px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 帮你选车</h1>
            <p class="subtitle">第 <span id="q-current">1</span> / <span id="q-total">5</span> 题</p>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progress-bar" style="width: 20%;"></div>
        </div>

        <div class="question-card">
            <div class="question-text" id="question-text">你的购车预算是多少？</div>
            <div class="options" id="options"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-secondary" onclick="prevQuestion()">上一题</button>
            <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>下一题</button>
        </div>
    </div>

    <script>
        // 写死的测试题数据
        const questions = [
            {
                text: "1. 你的购车预算是多少？",
                options: [
                    { text: "10 万以下", value: "budget_low" },
                    { text: "10-15 万", value: "budget_mid" },
                    { text: "15-25 万", value: "budget_high" },
                    { text: "25 万以上", value: "budget_premium" }
                ]
            },
            {
                text: "2. 主要用车场景是？",
                options: [
                    { text: "日常通勤代步", value: "scenario_commute" },
                    { text: "家庭出行", value: "scenario_family" },
                    { text: "商务接待", value: "scenario_business" },
                    { text: "户外越野", value: "scenario_offroad" }
                ]
            },
            {
                text: "3. 能源类型偏好？",
                options: [
                    { text: "燃油车", value: "energy_gas" },
                    { text: "混合动力", value: "energy_hybrid" },
                    { text: "纯电动", value: "energy_ev" },
                    { text: "无所谓，合适就行", value: "energy_any" }
                ]
            },
            {
                text: "4. 最看重车辆的哪些方面？",
                options: [
                    { text: "外观设计", value: "preference_looks" },
                    { text: "动力性能", value: "preference_performance" },
                    { text: "空间舒适性", value: "preference_comfort" },
                    { text: "科技配置", value: "preference_tech" },
                    { text: "保值率", value: "preference_value" }
                ]
            },
            {
                text: "5. 品牌偏好？",
                options: [
                    { text: "国产自主品牌", value: "brand_domestic" },
                    { text: "合资品牌", value: "brand_joint" },
                    { text: "进口品牌", value: "brand_import" },
                    { text: "不看品牌，看产品力", value: "brand_any" }
                ]
            }
        ];

        // 状态
        let currentQuestion = 0;
        let answers = {};

        // 初始化
        function init() {
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            
            // 更新题号
            document.getElementById('q-current').textContent = currentQuestion + 1;
            document.getElementById('q-total').textContent = questions.length;
            
            // 更新进度条
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            
            // 更新问题文本
            document.getElementById('question-text').textContent = q.text;
            
            // 更新选项
            const optionsHtml = q.options.map(opt => `
                <div class="option" data-value="${opt.value}" onclick="selectOption(this)">
                    ${opt.text}
                </div>
            `).join('');
            
            document.getElementById('options').innerHTML = optionsHtml;
            
            // 重置按钮状态
            document.getElementById('next-btn').disabled = true;
        }

        function selectOption(el) {
            // 清除其他选项的选中状态
            document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
            
            // 选中当前选项
            el.classList.add('selected');
            
            // 保存答案
            const value = el.dataset.value;
            answers[currentQuestion] = value;
            
            // 启用下一题按钮
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                // 保存到 localStorage
                localStorage.setItem('car_answers', JSON.stringify(answers));
                // 跳转到结果页
                location.href = 'result.html';
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // 启动
        init();
    </script>
</body>
</html>
